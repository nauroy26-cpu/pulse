<!DOCTYPE html>
<html lang="fr" class="dark">
  <head>
  <script>
    // Force reload from server on first launch (clears disk cache)
    (function() {
      if (!sessionStorage.getItem('pulse_launched')) {
        sessionStorage.setItem('pulse_launched', '1');
        var nav = performance.getEntriesByType('navigation')[0];
        if (nav && (nav.type === 'back_forward' || nav.transferSize === 0)) {
          window.location.reload(true);
        }
      }
    })();
  </script>
